<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALERÍA</title>
    <link rel="stylesheet"  href="css/estilos.css">
   
<style>
.info-foto {
    margin: 20px;
}

.info-foto img {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 7px solid #fff;
}
</style>

</head>

<body>
    <table>
        <caption>Formatos de imagen</caption>
        <tr>
            <td>GIF</td>
            <td>JPG</td>
            <td>PNG</td>
            <td>MP4</td>
        </tr>
        <tr>
            <td><img src="imagenes/visitas.gif" width="200px"></td>
            <td><img src="imagenes/Vistas.jpg" width="200px"></td>
            <td><img src="imagenes/visitas.png" width="200px"></td>
            <td>
                <video controls width="200" playsinline muted autoplay>
                    <source src="videos/visitas.mp4" type="video/mp4">
                </video>
            </td>
        </tr>
    </table>
    <div class="info-foto">
        <img src="imagenes/Vistas(1).jpg">
        <h4>Visitas</h4>
    </div>
</body>

</html>
